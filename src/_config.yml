# Book settings
# Learn more at https://jupyterbook.org/customize/config.html

title: The Duckietown Manual
author: Duckietown, Inc.
logo: logo-dtmatrix.png
# Patterns to skip when building the book. Can be glob-style (e.g. "*skip.ipynb")
exclude_patterns: ["_build", "Thumbs.db", ".DS_Store", "**.ipynb_checkpoints"]

# Force re-execution of notebooks on each build.
# See https://jupyterbook.org/content/execute.html
execute:
  execute_notebooks: force

# Define the name of the latex output file for PDF builds
latex:
  latex_documents:
    targetname: book.tex

# Add a bibtex file so that we can create citations
bibtex_bibfiles:
  - references.bib

# Information about where the book exists on the web
repository:
  url: https://github.com/duckietown/duckietown-manual
  path_to_book: src

# Add GitHub buttons to your book
# See https://jupyterbook.org/customize/config.html#add-a-link-to-your-repository
html:
  favicon: _images/favicon.ico
  use_issues_button: true
  use_repository_button: true
  use_edit_page_button: true
  extra_navbar: ""

sphinx:
  extra_extensions:
#    - sphinx_llms_txt (fails with Sphinx 4.5.0 - going the manual route)
    - sphinx_sitemap
  config:
    html_baseurl: "https://docs.duckietown.com/ente/duckietown-manual/"
    html_extra_path:
      - robots.txt
    myst_substitutions:
      dt_workspace_note_prefix: >-
        If you are using a [Duckietown Workspace](setup-devcontainer),
      dt_workspace_duckietown_viewer_note: >-
        {} run this command from a local terminal outside the dev container. To
        open the browser-based Viewer instead, use `dts duckiebot {}
        DUCKIEBOT_NAME --browser`.
      dt_workspace_matrix_lx_warning: >-
        {} Duckietown Viewer apps and Duckiematrix renderer-only commands such
        as `dts matrix run` must be run from a local terminal outside the dev
        container. The `--standalone` flag starts both the Engine and Renderer
        in the same environment.
      dt_workspace_start_matrix_split_note: >-
        {} run `dts code start_matrix --no-renderer` inside the dev container,
        then launch the Duckiematrix renderer from a local terminal outside the
        dev container with `dts matrix run`.
      dt_workspace_matrix_standalone_note: >-
        {} the `--standalone` flag starts both the Duckiematrix Engine and
        Renderer in the same environment. For the split workspace workflow,
        start the Engine separately and connect to it with `dts matrix run`
        from a local terminal outside the dev container.
    intersphinx_mapping:
      jupyter-book-docs:
        - "https://jupyterbook.org/en/stable"
        - null
